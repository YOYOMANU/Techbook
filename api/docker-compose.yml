services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "true"
      APP_KEY: base64:2ybR/zIB6Bp5VLBmbvPZSokh5wu1XGT0yIV6AwXgBPQ=
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: techbook
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      CLOUDINARY_CLOUD_NAME: dkmz8fxdl
      CLOUDINARY_API_KEY: 624916136188824
      CLOUDINARY_API_SECRET: tQ7z0o0R9NrXVi_V7SJFgLJisgk
      MEDIA_DISK: cloudinary
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: techbook
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  pgdata:
